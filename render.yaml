# https://render.com/docs/blueprint-spec
# Deploy: connect repo → New Blueprint → select render.yaml
services:
  - type: web
    name: progres-liga-api
    runtime: python
    rootDir: services/api
    plan: free
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
